name: Daily Content Generation

on:
  schedule:
    - cron: '0 2 * * *'       # UTC 02:00 daily
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r generate/requirements.txt

      - name: Generate content
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: python generate/main.py --count 10

      - name: Commit and push
        run: |
          git config user.name "content-bot"
          git config user.email "bot@insurtechinsights.com"
          git add content/
          git diff --staged --quiet || git commit -m "auto: daily content batch $(date +%Y-%m-%d)"
          git push

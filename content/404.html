    <style>
        :root {
            --navy: #0B1121;
            --accent: #2563EB;

            --bg: #F8FAFC;

        }
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
        body{font-family:var(--font-sans);line-height:1.75;color:var(--text);background:var(--bg);font-size:1rem}

        .nav{background:var(--navy);position:sticky;top:0;z-index:100;height:var(--nav-height);border-bottom:1px solid rgba(255,255,255,0.08)}
        .nav-inner{max-width:var(--site-width);margin:0 auto;padding:0 24px;height:100%;display:flex;align-items:center;justify-content:center}
        .nav-logo{display:flex;align-items:center;text-decoration:none;flex-shrink:0}
        .nav-logo-img{height:36px;width:auto;display:block}
        @media(max-width:768px){.nav-logo-img{height:28px}}
        @media(max-width:480px){.nav-logo-img{height:24px}}

        .cat-bar{display:flex;align-items:center;gap:0;background:var(--surface);border-bottom:1px solid var(--border);padding:8px 0;max-width:var(--site-width);margin:0 auto}
        .cat-bar-track{flex:1;overflow-x:auto;scroll-behavior:smooth;-webkit-overflow-scrolling:touch;scrollbar-width:none;min-width:0}
        .cat-bar-track::-webkit-scrollbar{display:none}
        .cat-bar-inner{display:flex;gap:8px;white-space:nowrap;min-width:max-content;padding:0 4px;justify-content:center}
        .cat-bar-item{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:100px;text-decoration:none;font-size:0.8rem;font-weight:500;color:var(--text-secondary);background:var(--bg);border:1px solid var(--border);transition:all 0.15s;flex-shrink:0}
        .cat-bar-item:hover{background:#EFF6FF;border-color:var(--accent);color:var(--accent)}
        .cat-bar-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

        .main{padding:0 24px}
        .page-container{max-width:800px;margin:0 auto;padding:80px 0;text-align:center}
        .page-container h1{font-size:clamp(3rem,8vw,6rem);font-weight:800;letter-spacing:-0.03em;color:var(--navy);margin-bottom:12px;line-height:1}
        .page-container .subtitle{font-size:1.15rem;color:var(--text-secondary);margin-bottom:32px;line-height:1.6}
        .page-container a{color:var(--accent);text-decoration:underline;text-underline-offset:3px}
        .page-container a:hover{color:#1D4ED8}
        .btn-home{display:inline-block;padding:12px 32px;background:var(--accent);color:#fff;border-radius:var(--radius-sm);text-decoration:none;font-weight:600;font-size:1rem;transition:background 0.15s}
        .btn-home:hover{background:#1D4ED8;color:#fff}

        .footer{background:var(--navy);color:rgba(255,255,255,0.55);padding:48px 0 32px;margin-top:80px;font-size:0.85rem}
        .footer-inner{max-width:var(--site-width);margin:0 auto;padding:0 24px}
        .footer-bottom{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}

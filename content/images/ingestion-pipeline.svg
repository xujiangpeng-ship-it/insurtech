<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#EFF6FF"/><stop offset="100%" stop-color="#DBEAFE"/></linearGradient>
    <linearGradient id="box1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#2563EB"/><stop offset="100%" stop-color="#1D4ED8"/></linearGradient>
  </defs>
  <rect width="800" height="200" rx="12" fill="url(#bg1)" stroke="#BFDBFE" stroke-width="2"/>
  <text x="400" y="30" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" font-weight="700" fill="#1E3A5F">Data Ingestion Pipeline</text>

  <!-- Box 1 -->
  <rect x="30" y="55" width="130" height="50" rx="8" fill="url(#box1)"/>
  <text x="95" y="85" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#fff">ACORD XML</text>

  <!-- Arrow 1 -->
  <line x1="165" y1="80" x2="225" y2="80" stroke="#2563EB" stroke-width="2" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563EB"/></marker></defs>

  <!-- Box 2 -->
  <rect x="235" y="55" width="130" height="50" rx="8" fill="url(#box1)"/>
  <text x="300" y="85" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#fff">CSV / Flat Files</text>

  <!-- Arrow 2 -->
  <line x1="370" y1="80" x2="430" y2="80" stroke="#2563EB" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Box 3 -->
  <rect x="440" y="55" width="130" height="50" rx="8" fill="url(#box1)"/>
  <text x="505" y="85" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#fff">MGA / TPA APIs</text>

  <!-- Arrow 3 -->
  <line x1="575" y1="80" x2="635" y2="80" stroke="#2563EB" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Box 4 - Normalizer -->
  <rect x="645" y="50" width="130" height="60" rx="8" fill="#059669"/>
  <text x="710" y="75" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#fff">Normalization</text>
  <text x="710" y="95" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#D1FAE5">Engine</text>

  <!-- Bottom labels -->
  <text x="95" y="155" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#64748B">Policy XML</text>
  <text x="300" y="155" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#64748B">Broker Data</text>
  <text x="505" y="155" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#64748B">Bordereaux</text>
  <text x="710" y="140" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#64748B">Unified Schema</text>
</svg>